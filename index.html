<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cinematic Property Viewer</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDNiNDQ4Yi1hMzg0LTQxYzEtYjMxYy00NGJlMjBiN2I4YzYiLCJpZCI6NDA2NzI3LCJpYXQiOjE3NzQwNTEzMzd9.W410ifK9UItmiq6mZIr0ot8JXGgi4T9mCBc9GIUaykA";

    let cinematicActive = true;

    async function init() {

      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        shadows: true
      });

      viewer.scene.globe.enableLighting = true;

      const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4550299);
      viewer.scene.primitives.add(tileset);

      await tileset.readyPromise;

      // 🎯 Initial cinematic position
      viewer.camera.flyToBoundingSphere(tileset.boundingSphere, {
        duration: 2,
        offset: new Cesium.HeadingPitchRange(
          Cesium.Math.toRadians(45),
          Cesium.Math.toRadians(-30),
          tileset.boundingSphere.radius * 2
        )
      });

      window.viewer = viewer;
      window.tileset = tileset;

      // 👇 Detect user interaction → STOP cinematic
      viewer.camera.moveStart.addEventListener(() => {
        cinematicActive = false;
        console.log("⛔ Cinematic stopped by user");
      });

      startCinematic();
    }

    function startCinematic() {
      let angle = 0;
      let phase = 0;

      window.viewer.clock.onTick.addEventListener(() => {

        if (!cinematicActive) return;

        const center = window.tileset.boundingSphere.center;

        angle += 0.002;

        // 🎬 Multiple cinematic styles
        let pitch;
        let range;

        if (phase === 0) {
          // Wide orbit
          pitch = Cesium.Math.toRadians(-25);
          range = window.tileset.boundingSphere.radius * 3;

          if (angle > Math.PI * 2) {
            phase = 1;
            angle = 0;
          }

        } else if (phase === 1) {
          // Closer cinematic shot
          pitch = Cesium.Math.toRadians(-35);
          range = window.tileset.boundingSphere.radius * 1.8;

          if (angle > Math.PI * 2) {
            phase = 2;
            angle = 0;
          }

        } else {
          // Top cinematic tilt
          pitch = Cesium.Math.toRadians(-60);
          range = window.tileset.boundingSphere.radius * 2.5;

          if (angle > Math.PI * 2) {
            phase = 0;
            angle = 0;
          }
        }

        const offset = new Cesium.HeadingPitchRange(
          angle,
          pitch,
          range
        );

        window.viewer.camera.lookAt(center, offset);
      });
    }

    // OPTIONAL: Restart cinematic if needed
    window.restartCinematic = function() {
      cinematicActive = true;
      console.log("▶️ Cinematic restarted");
    };

    init();
  </script>
</body>
</html>
