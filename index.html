<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cesium Base</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMzM3MDQzZC01MWZiLTRhMzgtODA5Yy04ZjY4ZDk1Y2ZjYzYiLCJpZCI6NDA2NzI3LCJpYXQiOjE3NzQwNTA4NDB9.uilBWuqBeZheLIr30n9Qi97is0aF5TrolpIurNf_fSQ";

async function init() {

  const viewer = new Cesium.Viewer('cesiumContainer', {
    terrain: Cesium.Terrain.fromWorldTerrain()
  });

  // 🔥 STEP 1: ONLY GOOGLE TILES (test first)
  const googleTiles = await Cesium.createGooglePhotorealistic3DTileset();
  viewer.scene.primitives.add(googleTiles);

  // Focus somewhere known
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-75.5957, 40.2994, 500),
  });

  console.log("✅ Google 3D working");

}

init();
</script>
</body>
</html>
