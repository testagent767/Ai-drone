<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cesium Property Viewer</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    // 🔴 PUT YOUR TOKEN HERE
    Cesium.Ion.defaultAccessToken = "YOUR_NEW_TOKEN_HERE";

    async function init() {

      // 1️⃣ Create viewer
      const viewer = new Cesium.Viewer('cesiumContainer', {
        terrain: Cesium.Terrain.fromWorldTerrain()
      });

      // 2️⃣ Load your 3D property (VERY IMPORTANT)
      const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4550299);
      viewer.scene.primitives.add(tileset);

      // 3️⃣ Wait until fully loaded
      await tileset.readyPromise;

      // 4️⃣ Zoom directly to your property
      await viewer.zoomTo(tileset);

      // 5️⃣ Save globally (needed for Puppeteer later)
      window.viewer = viewer;
      window.tileset = tileset;

      console.log("✅ Property loaded");

      // OPTIONAL: start auto rotation (for testing)
      startOrbit();
    }

    // 🎥 Simple orbit animation (drone feel)
    function startOrbit() {
      let angle = 0;

      window.viewer.clock.onTick.addEventListener(() => {
        angle += 0.002;

        const center = window.tileset.boundingSphere.center;

        const offset = new Cesium.HeadingPitchRange(
          angle,
          Cesium.Math.toRadians(-30),
          200
        );

        window.viewer.camera.lookAt(center, offset);
      });
    }

    // 🎯 Manual camera angle (for Puppeteer later)
    window.setCameraAngle = function(angle) {
      const center = window.tileset.boundingSphere.center;

      const offset = new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(angle),
        Cesium.Math.toRadians(-30),
        200
      );

      window.viewer.camera.lookAt(center, offset);
    };

    // 🚀 Start everything
    init();

  </script>
</body>
</html>
